name: Go Tests

on:
  push:
    paths: ['**/*.go', 'go.mod', 'go.sum']
  pull_request:
    paths: ['**/*.go', 'go.mod', 'go.sum']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196e88a9c30  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.out ./internal/...
          go tool cover -func=coverage.out | grep total

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          python3 -c "import sys; sys.exit(0 if float('${COVERAGE}') >= 85.0 else 1)"

      # SBOM generation — activate when the first external dependency is
      # added to go.mod. Currently stdlib-only, so SBOM would be empty.
      # When activated, promote the HARNESS.md constraint from unverified
      # to deterministic.
      #
      # - name: Generate SBOM
      #   run: |
      #     go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      #     cyclonedx-gomod app -json -output sbom.cdx.json ./cmd/mdcheck/
      #
      # - name: Upload SBOM
      #   uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      #   with:
      #     name: sbom
      #     path: sbom.cdx.json

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
